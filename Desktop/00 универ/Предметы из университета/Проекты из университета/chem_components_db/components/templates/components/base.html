<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{% block title %}База данных химических компонентов{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, Segoe UI, Arial, sans-serif;
            max-width: 960px;
            margin: 0 auto;
            padding: 24px;
            color: #1a1a1a;
            background: #fafafa;
        }
        header h1 { font-size: 22px; margin-bottom: 4px; }
        header a { color: inherit; text-decoration: none; }
        .search-form { display: flex; gap: 8px; flex-wrap: wrap; margin: 20px 0; }
        .search-form input[type="text"] {
            flex: 1; min-width: 200px; padding: 8px;
            border: 1px solid #ccc; border-radius: 4px;
        }
        .search-form select, .search-form button {
            padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white;
        }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
        th { background: #f0f0f0; }
        tr:hover { background: #f5f9ff; }
        a.component-link { color: #1a5fb4; text-decoration: none; }
        a.component-link:hover { text-decoration: underline; }
        .pagination { margin-top: 16px; display: flex; gap: 12px; }
        .card { background: white; border: 1px solid #eee; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .muted { color: #777; font-size: 14px; }
        .back-link { display: inline-block; margin-bottom: 16px; }
    </style>
</head>
<body>
<header>
    <h1><a href="{% url 'list' %}">База данных химических компонентов</a></h1>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
